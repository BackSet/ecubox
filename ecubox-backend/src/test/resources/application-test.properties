# Perfil "test": pruebas de integracion con PostgreSQL real (Testcontainers).
#
# El datasource lo inyecta el contenedor en tiempo de ejecucion via
# @ServiceConnection (ver AbstractPostgresIntegrationTest); aqui solo se definen
# valores NO sensibles necesarios para arrancar el contexto sin depender del .env
# de desarrollo. No hay credenciales reales hardcodeadas.

# Flyway real contra el contenedor, usando SOLO las migraciones de produccion
# (db/migration), sin los seeds solo-dev (db/dev). Asi la prueba valida la
# cadena de migraciones tal como corre en produccion.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Hibernate valida el esquema generado por Flyway (igual que en dev/prod).
spring.jpa.hibernate.ddl-auto=validate

# Secreto JWT solo para test: cumple el minimo de 32 bytes exigido por HS256.
# No corresponde a ningun entorno real.
jwt.secret=test-secret-test-secret-test-secret-0123456789
jwt.expiration=86400000

# Sin bootstrap de ADMIN ni Web Push en pruebas de integracion.
admin.bootstrap.enabled=false
webpush.enabled=false
