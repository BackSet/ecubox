# Perfil prod: sin valores por defecto; todas las variables deben estar definidas en el entorno
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Swagger desactivado en producción (opcional)
springdoc.swagger-ui.enabled=false

# Cabeceras de seguridad: HSTS solo en producción
security.headers.hsts.enabled=true
