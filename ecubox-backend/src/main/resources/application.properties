spring.application.name=ecubox-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
jwt.issuer=${JWT_ISSUER:ecubox-backend}

# Zona horaria de la aplicación. El cálculo de vencimiento / fecha límite de
# retiro usa America/Guayaquil; fijamos la TZ por defecto de Jackson para que
# la serialización sea consistente con ZONA_ECUADOR.
spring.jackson.time-zone=America/Guayaquil

# JPA (no sensibles)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Reduce viajes JDBC en escrituras masivas y consultas de asociaciones LAZY.
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_JDBC_BATCH_SIZE:50}
spring.jpa.properties.hibernate.default_batch_fetch_size=${HIBERNATE_BATCH_FETCH_SIZE:32}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Comprime respuestas JSON/HTML suficientemente grandes.
server.compression.enabled=true
server.compression.min-response-size=2KB
server.compression.mime-types=application/json,application/problem+json,text/html,text/plain,text/css,application/javascript

# Pool dedicado para @Scheduled (OutboxRelayService, TrackingViewProjector, GuiaMasterAutoCierreJob)
spring.task.scheduling.pool.size=4
spring.task.scheduling.thread-name-prefix=ecubox-sched-

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ── Observabilidad (Actuator) ──────────────────────────────────────────────
# Exposición HTTP mínima y segura: solo health/info por defecto. Ampliar por
# entorno (p. ej. añadir `metrics,prometheus`) con la variable, nunca de forma
# pública sin protección.
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
# El detalle de health (componentes/DB) no se expone por defecto para no filtrar
# infraestructura; en entornos internos puede ponerse `when_authorized`/`always`.
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
management.endpoint.health.show-components=${MANAGEMENT_HEALTH_SHOW_COMPONENTS:never}
# Sondas liveness/readiness (Railway/k8s) sobre /actuator/health/{liveness,readiness}.
management.endpoint.health.probes.enabled=true
# `info` no debe volcar variables de entorno (evita filtrar secretos/PII).
management.info.env.enabled=false

# ── Logs con contexto de traza ─────────────────────────────────────────────
# Incluye traceId/spanId cuando el OTEL Java agent inyecta el contexto en el MDC
# (claves `trace_id`/`span_id`); queda vacío si no hay agente o traza activa.
# No se loguean tokens ni PII.
logging.pattern.level=%5p [${spring.application.name:-},%X{trace_id:-},%X{span_id:-}]

# Springdoc / OpenAPI (paths; habilitación por perfil)
springdoc.api-docs.path=/v3/api-docs
springdoc.writer-with-order-by-keys=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Scalar UI (documentación interactiva)
scalar.path=/scalar
scalar.url=/v3/api-docs
scalar.enabled=true

# CORS (orígenes por perfil; valor por defecto para tests)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Tracking event-driven
tracking.timeline.use-events=${TRACKING_TIMELINE_USE_EVENTS:true}
tracking.outbox.relay-delay-ms=${TRACKING_OUTBOX_RELAY_DELAY_MS:5000}
tracking.outbox.max-attempts=${TRACKING_OUTBOX_MAX_ATTEMPTS:6}

# Protección por IP de endpoints públicos sensibles.
auth.ratelimit.enabled=${AUTH_RATELIMIT_ENABLED:true}
auth.ratelimit.capacity=${AUTH_RATELIMIT_CAPACITY:10}
auth.ratelimit.refill-tokens=${AUTH_RATELIMIT_REFILL_TOKENS:10}
auth.ratelimit.refill-period-seconds=${AUTH_RATELIMIT_REFILL_PERIOD_SECONDS:60}
# Activar solo detrás de un proxy que sobrescriba estas cabeceras.
security.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:false}

# Web Push / PWA. Se mantiene apagado hasta configurar claves VAPID reales.
webpush.enabled=${WEB_PUSH_ENABLED:false}
webpush.subject=${WEB_PUSH_SUBJECT:}
webpush.public-key=${WEB_PUSH_PUBLIC_KEY:}
webpush.private-key=${WEB_PUSH_PRIVATE_KEY:}
webpush.ttl-seconds=${WEB_PUSH_TTL_SECONDS:86400}
