# Perfil dev: lee credenciales SOLO desde el entorno (.env) sin fallbacks sensibles.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecubox_v1}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}

# Cabeceras de seguridad: HSTS desactivado en dev
security.headers.hsts.enabled=false

# Actuator en dev: cómodo para depurar en local (no aplica en prod). Expone
# metrics y muestra el detalle de health. /actuator/health sigue siendo público;
# el resto (/actuator/metrics, /info) requiere autenticación por SecurityConfig.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# En dev, DevFlywayConfig ejecuta `flyway repair` automaticamente antes de migrar
# para tolerar cambios en migraciones recien aplicadas (NO se activa en prod).

# Seeds solo-dev: ademas de las migraciones de prod (db/migration), se carga
# db/dev, que alinea el catalogo de estados de rastreo con el de produccion
# (migracion repetible idempotente). Esta location NO existe en prod.
spring.flyway.locations=classpath:db/migration,classpath:db/dev

# Bootstrap primer ADMIN (contraseña solo por variable de entorno ADMIN_INITIAL_PASSWORD)
admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
admin.username=${ADMIN_USERNAME:admin}
admin.email=${ADMIN_EMAIL:}
admin.initial.password=${ADMIN_INITIAL_PASSWORD:}
