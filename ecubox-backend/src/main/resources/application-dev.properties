# Perfil dev: valores por defecto para desarrollo local (BD y JWT desde env con fallback)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecubox_v1}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:nSpass_01M}
spring.datasource.driver-class-name=org.postgresql.Driver

jwt.secret=${JWT_SECRET:ecubox-dev-secret-key-minimo-256-bits-para-hs256-seguridad}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}

# Cabeceras de seguridad: HSTS desactivado en dev
security.headers.hsts.enabled=false

# Bootstrap primer ADMIN (contraseña solo por variable de entorno ADMIN_INITIAL_PASSWORD)
admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
admin.username=${ADMIN_USERNAME:admin}
admin.email=${ADMIN_EMAIL:}
admin.initial.password=${ADMIN_INITIAL_PASSWORD:}
