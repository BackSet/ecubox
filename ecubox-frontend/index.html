<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-light.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#7B3FE4" />
    <meta name="theme-color" content="#7B3FE4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F1F42" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ECUBOX - Soluciones Logísticas y Corporativas" />
    <title>ECUBOX | Tus paquetes llegan de una</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      // Aplica el tema (light/dark/system) ANTES del primer paint para evitar
      // FOUC (flash de fondo blanco al cargar con tema oscuro). Debe replicar
      // la misma lógica de src/stores/themeStore.ts (clave 'ecubox_theme' del
      // persist de zustand). Si fallara, la app cae al default 'system'.
      (function () {
        try {
          var stored = window.localStorage.getItem('ecubox_theme');
          var theme = 'system';
          if (stored) {
            var parsed = JSON.parse(stored);
            var saved = parsed && parsed.state && parsed.state.theme;
            if (saved === 'light' || saved === 'dark' || saved === 'system') {
              theme = saved;
            }
          }
          var effective = theme;
          if (theme === 'system') {
            effective = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          var root = document.documentElement;
          root.dataset.theme = theme;
          root.style.colorScheme = effective;
          if (effective === 'dark') {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
        } catch (e) {
          // Storage bloqueado: dejamos que React aplique el default tras montar.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
