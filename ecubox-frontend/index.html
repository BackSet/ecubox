<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-light.svg?v=8" id="ecubox-favicon" />
    <link rel="apple-touch-icon" href="/icons/ecubox-monogram-180.png?v=8" />
    <link rel="mask-icon" href="/favicon.svg?v=8" color="#6C5CE7" />
    <link rel="manifest" href="/manifest.webmanifest?v=8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ECUBOX" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" id="ecubox-theme-color" content="#F2F3F5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Compra en Amazon, eBay o Shein y recíbelo en Ecuador. ECUBOX te da un casillero gratis en USA, envíos en 8–12 días, rastreo por paquete y tarifas transparentes." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ECUBOX" />
    <link rel="canonical" href="https://ecubox.org/" />
    <title>ECUBOX | Casillero en USA y envíos a Ecuador con rastreo</title>

    <!-- Open Graph / redes sociales. Estáticas en el HTML porque los crawlers
         (WhatsApp, Facebook, X, LinkedIn) NO ejecutan JavaScript: solo leen este
         documento. El router actualiza estos valores por página para navegadores
         y buscadores que sí renderizan JS. -->
    <meta property="og:site_name" content="ECUBOX" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_EC" />
    <meta property="og:url" content="https://ecubox.org/" />
    <meta property="og:title" content="ECUBOX | Casillero en USA y envíos a Ecuador con rastreo" />
    <meta property="og:description" content="Compra en Amazon, eBay o Shein y recíbelo en Ecuador. Casillero gratis en USA, envíos en 8–12 días, rastreo por paquete y tarifas transparentes." />
    <meta property="og:image" content="https://ecubox.org/og-image.png" />
    <meta property="og:image:secure_url" content="https://ecubox.org/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1376" />
    <meta property="og:image:height" content="768" />
    <meta property="og:image:alt" content="ECUBOX – Casillero en USA y envíos a Ecuador" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ECUBOX | Casillero en USA y envíos a Ecuador con rastreo" />
    <meta name="twitter:description" content="Compra en Amazon, eBay o Shein y recíbelo en Ecuador. Casillero gratis en USA, envíos en 8–12 días, rastreo por paquete y tarifas transparentes." />
    <meta name="twitter:image" content="https://ecubox.org/og-image.png" />
    <meta name="twitter:image:alt" content="ECUBOX – Casillero en USA y envíos a Ecuador" />
    <!-- Estilos criticos inline: el bundle CSS de Vite carga con el modulo JS.
         Sin esto, el script de tema aplica .dark antes de que existan variables
         Tailwind y el navegador fuerza recalculo / FOUC. Colores = index.css -->
    <style id="ecubox-critical">
      html {
        color-scheme: light dark;
        background-color: #f2f3f5;
      }
      html.dark {
        color-scheme: dark;
        background-color: #0d0d0f;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background-color: inherit;
        color: #0d0d0f;
        font-family: 'Sora', system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      html.dark body {
        color: #ececf0;
      }
      #root {
        min-height: 100vh;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      />
    </noscript>
    <script>
      // Aplica el tema (light/dark/system) ANTES del primer paint. Debe replicar
      // src/stores/themeStore.ts (clave ecubox_theme). Los fondos ya estan en
      // #ecubox-critical; aqui solo alternamos .dark sin esperar al bundle CSS.
      (function () {
        try {
          var stored = window.localStorage.getItem('ecubox_theme');
          var theme = 'system';
          if (stored) {
            var parsed = JSON.parse(stored);
            var saved = parsed && parsed.state && parsed.state.theme;
            if (saved === 'light' || saved === 'dark' || saved === 'system') {
              theme = saved;
            }
          }
          var effective = theme;
          if (theme === 'system') {
            effective = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          var root = document.documentElement;
          root.dataset.theme = theme;
          root.style.colorScheme = effective;
          if (effective === 'dark') {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
          var barColor = effective === 'dark' ? '#0D0D0F' : '#F2F3F5';
          var themeMeta = document.getElementById('ecubox-theme-color');
          if (themeMeta) themeMeta.setAttribute('content', barColor);
          var appleBar = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
          if (appleBar) {
            appleBar.setAttribute('content', effective === 'dark' ? 'black-translucent' : 'default');
          }
          var favicon = document.getElementById('ecubox-favicon');
          if (favicon) {
            favicon.setAttribute('href', effective === 'dark' ? '/favicon-dark.svg?v=8' : '/favicon-light.svg?v=8');
          }
        } catch (e) {
          // Storage bloqueado: dejamos que React aplique el default tras montar.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
