<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E6BE6"/>
      <stop offset="100%" stop-color="#7B3FE4"/>
    </linearGradient>
    <linearGradient id="flapL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B3FE4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7B3FE4" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="flapR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E6BE6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2E6BE6" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Box body -->
  <rect x="10" y="32" width="80" height="56" rx="2.5" stroke="url(#iconGrad)" stroke-width="2.5" fill="none"/>
  <!-- Lid fold -->
  <path d="M10 44 L50 55 L90 44" stroke="url(#iconGrad)" stroke-width="2.5" fill="none"/>
  <!-- Tape strip -->
  <rect x="40" y="32" width="20" height="23" rx="1.5" fill="#7B3FE4" fill-opacity="0.22"/>
  <!-- Center seam -->
  <line x1="50" y1="32" x2="50" y2="55" stroke="url(#iconGrad)" stroke-width="2.5"/>
  <!-- Left flap -->
  <path d="M10 32 L24 18 L50 32" stroke="url(#flapL)" stroke-width="1.75" fill="none"/>
  <!-- Right flap -->
  <path d="M90 32 L76 18 L50 32" stroke="url(#flapR)" stroke-width="1.75" fill="none"/>
  <!-- Speed lines (gold) -->
  <line x1="58" y1="71" x2="83" y2="71" stroke="#C9A84C" stroke-width="2.25" stroke-linecap="round"/>
  <line x1="63" y1="79" x2="83" y2="79" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
</svg>
